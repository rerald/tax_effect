<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세금 절세 시뮬레이션 대시보드</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        .dashboard-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        .dashboard-header {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 48px 24px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            margin-bottom: 40px;
            backdrop-filter: blur(10px);
        }
        .dashboard-header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 12px;
        }
        .dashboard-header .subtitle {
            font-size: 1rem;
            color: #7f8c8d;
            font-weight: 400;
        }
        .dashboard-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
        }
        .dashboard-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            text-decoration: none;
            color: inherit;
            display: block;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .dashboard-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.15);
        }
        .dashboard-card h3 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 12px;
        }
        .dashboard-card p {
            font-size: 0.95rem;
            color: #7f8c8d;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .dashboard-card .card-btn {
            display: inline-block;
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 500;
            font-size: 0.95rem;
            border-radius: 10px;
            transition: opacity 0.2s ease;
        }
        .dashboard-card:hover .card-btn {
            opacity: 0.95;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <header class="dashboard-header">
            <h1>세금 절세 시뮬레이션 대시보드</h1>
            <p class="subtitle">원하는 시뮬레이션 도구를 선택하여 세금 효과를 분석해 보세요</p>
        </header>

        <div class="dashboard-cards">
            <a href="net-salary.html" class="dashboard-card">
                <h3>넷급여 역산 계산기</h3>
                <p>목표 세후 실수령액에 맞는 세전 급여와 사업주 총 부담액을 역산합니다. 근로계약서 작성용 데이터 제공.</p>
                <span class="card-btn">시작하기 →</span>
            </a>
            <a href="corporate-income.html" class="dashboard-card">
                <h3>법인소득처분 세금효과</h3>
                <p>급여, 상여, 배당 등 소득처분 방식별 세금 부담을 비교 분석합니다. 2025년 최신 세율 적용.</p>
                <span class="card-btn">시작하기 →</span>
            </a>
            <a href="venture.html" class="dashboard-card">
                <h3>벤처투자소득공제 절세시뮬레이션</h3>
                <p>조세특례제한법 제16조 벤처투자 소득공제를 활용한 절세 효과를 계산합니다.</p>
                <span class="card-btn">시작하기 →</span>
            </a>
        </div>
    </div>
</body>
</html>
